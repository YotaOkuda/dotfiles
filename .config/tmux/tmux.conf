# prefixをC-aにする
set -g prefix C-a
unbind C-b

# ペインのキーバインド

# prefix+\でペインを垂直分割する
bind \\ split-window -h
# prefix+-でペインを水平分割する
bind - split-window -v


# ペインの移動
bind -n C-o select-pane -t :.+
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ペインを最大化する
bind -n C-z resize-pane -Z

# ペイン自体の移動
bind -r [ swap-pane -U
bind -r ] swap-pane -D


## ウィンドウのキーバインド

# 新規ウィンドウ
bind C-c new-window
bind x confirm-before -p "kill window? (y/n)" kill-window

# ウィンドウを切り替える
bind -n S-left previous-window
bind -n S-right next-window


## ステータスラインの見た目の変更

# Tokyo Night カラーパレット
# bg:         #1a1b26  comment: #565f89
# blue:       #7aa2f7  cyan:    #7dcfff
# fg:         #c0caf5  bg_hl:   #292e42

# truecolorを有効にする
set-option -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# ステータスライン
set -g status-style "fg=#c0caf5,bg=#1a1b26"
set -g status-left '#[bg=#7aa2f7,fg=#1a1b26,bold] #S '
set -g status-left-length 30

# status-rightを非表示にする
set -g status-right ""

# window-statusを右寄せにする
set -g status-justify right

# windowのインデックスを1から始める
set -g base-index 1

# window-status
setw -g window-status-format '#[fg=#565f89] #I #W '
setw -g window-status-current-format '#[bg=#292e42,fg=#7aa2f7,bold]#{?client_prefix,#[bg=#292e42 fg=#7dcfff],} #I #W '


## ペインボーダー

# ボーダーを太線にする
set -g pane-border-lines heavy
# 非アクティブを暗く、アクティブをblueに
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"

## その他

# マウス操作を有効にする
set-option -g mouse on

# prefix+r で設定のリロード
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# vimキーバインド
set-window-option -g mode-keys vi


# tmuxプラグイン
# --- プラグイン管理 (TPM) ---

# TPM自体のリスト
set -g @plugin 'tmux-plugins/tpm'

# 導入したいプラグインのリスト
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect' # セッションの保存・復元
set -g @plugin 'tmux-plugins/tmux-continuum' # 自動的にセッションの状態を保存

# 自動復元を有効にする
set -g @continuum-restore 'on'

# 1. TPMが未インストールなら自動でインストールする設定
# (パスを ~/.config/tmux/plugins/tpm に統一)
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# TPMの初期化 (この行は必ず一番下に置く)
run '~/.config/tmux/plugins/tpm/tpm'
